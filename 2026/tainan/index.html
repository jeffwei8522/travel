<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026 台南小旅行 — Jeff & Hannah</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans TC', sans-serif; }

    /* Top bar */
    .topbar {
      background: linear-gradient(to right, #ffafbd, #ffc3a0);
      color: #fff;
      padding: 0.8rem 1.2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      z-index: 1000;
      position: relative;
    }
    .topbar h1 { font-size: 1.2rem; text-shadow: 1px 1px 2px rgba(0,0,0,0.2); }
    .topbar .subtitle { font-size: 0.85rem; opacity: 0.9; }

    /* Day filter buttons */
    .day-filter {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
    }
    .day-btn {
      padding: 0.35rem 0.8rem;
      border: 2px solid #fff;
      border-radius: 20px;
      background: transparent;
      color: #fff;
      font-weight: bold;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Noto Sans TC', sans-serif;
    }
    .day-btn:hover { background: rgba(255,255,255,0.3); }
    .day-btn.active { background: #fff; color: #d63384; }

    /* Map container */
    #map { width: 100%; height: calc(100vh - 56px); }

    /* Legend */
    .legend {
      background: white;
      padding: 12px 16px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      font-size: 0.85rem;
      line-height: 1.8;
    }
    .legend h4 { margin-bottom: 6px; color: #333; }
    .legend-item { display: flex; align-items: center; gap: 8px; }
    .legend-color {
      width: 18px; height: 18px;
      border-radius: 3px;
      border: 1px solid rgba(0,0,0,0.2);
      flex-shrink: 0;
    }

    /* Popup styling */
    .place-popup h3 { color: #d63384; margin-bottom: 4px; font-size: 1rem; }
    .place-popup .district { color: #888; font-size: 0.85rem; }
    .place-popup .note { margin-top: 6px; font-size: 0.9rem; }
    .place-popup .day-tags { margin-top: 6px; }
    .place-popup .day-tag {
      display: inline-block;
      padding: 1px 8px;
      border-radius: 10px;
      font-size: 0.75rem;
      font-weight: bold;
      color: #fff;
      margin-right: 4px;
    }
    .place-popup .type-badge {
      display: inline-block;
      padding: 1px 8px;
      border-radius: 10px;
      font-size: 0.75rem;
      font-weight: bold;
      color: #fff;
      margin-top: 4px;
    }

    /* Itinerary panel */
    .itinerary-panel {
      position: absolute;
      bottom: 20px;
      left: 10px;
      z-index: 1000;
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.2);
      padding: 14px 16px;
      max-width: 320px;
      font-size: 0.85rem;
      display: none;
    }
    .itinerary-panel h4 { color: #d63384; margin-bottom: 8px; }
    .itinerary-panel .itin-item {
      padding: 4px 0;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .itinerary-panel .itin-item:last-child { border-bottom: none; }
    .itin-time { font-weight: bold; color: #888; min-width: 50px; }
  </style>
</head>
<body>
  <div class="topbar">
    <div>
      <h1>2026 台南小旅行</h1>
      <span class="subtitle">4/3 (五) ~ 4/6 (一) ・ Jeff & Hannah</span>
    </div>
    <div class="day-filter">
      <button class="day-btn active" data-day="all">全部</button>
      <button class="day-btn" data-day="1" data-color="#e74c3c">Fri 抵達</button>
      <button class="day-btn" data-day="2" data-color="#3498db">Sat 海岸</button>
      <button class="day-btn" data-day="3" data-color="#2ecc71">Sun 市區</button>
      <button class="day-btn" data-day="4" data-color="#f39c12">Mon 北上</button>
    </div>
  </div>
  <div id="map"></div>
  <div class="itinerary-panel" id="itinerary-panel"></div>

  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // --- Config ---
    const VISITED_DISTRICTS = [
      '學甲區', '七股區',
      '安平區', '中西區', '北區', '南區', '東區',
      '安平區(海)'
    ];

    const DAY_COLORS = {
      1: '#e74c3c',
      2: '#3498db',
      3: '#2ecc71',
      4: '#f39c12'
    };

    const DAY_LABELS = {
      1: 'Fri 4/3',
      2: 'Sat 4/4',
      3: 'Sun 4/5',
      4: 'Mon 4/6'
    };

    const DAY_ITINERARY = {
      1: [
        { time: '14:00', text: '🚗 新竹出發（國道 1 or 3）' },
        { time: '17:00', text: '抵達台南' },
        { time: '18:00', text: '🏨 Check-in 湖美' },
        { time: '18:30', text: '🍔 丹丹漢堡晚餐' },
        { time: '20:00', text: '🌙 大東夜市（週五）' }
      ],
      2: [
        { time: '07:00', text: '🥩 牛肉湯早餐' },
        { time: '09:00', text: '🧂 七股鹽山（車程 35 min）' },
        { time: '11:00', text: '🏜️ 頂頭額沙洲（車程 20 min）' },
        { time: '13:00', text: '午餐' },
        { time: '15:00', text: '🏖️ 黃金海岸（車程 40 min）' },
        { time: '17:00', text: '🌅 漁光島 / 觀夕平台看日落' },
        { time: '19:00', text: '🌙 花園夜市 or 武聖夜市（週六都有）' }
      ],
      3: [
        { time: '08:00', text: '🥩 牛肉湯早餐' },
        { time: '09:30', text: '👘 拍旗袍（孔廟/府中街，2~3hr）' },
        { time: '12:00', text: '🏨 Check-out 湖美（行李放車上）' },
        { time: '12:30', text: '☕ 文青咖啡廳・午餐' },
        { time: '14:00', text: '🍦 蜷尾家（正興街）' },
        { time: '15:00', text: '🛍️ 桑原商店（又又美）' },
        { time: '16:30', text: '🚗 開車北上到學甲/新營（40 min）' },
        { time: '17:30', text: '🏨 Check-in 北邊住宿（待定）' }
      ],
      4: [
        { time: '08:00', text: '早餐' },
        { time: '09:30', text: '🐾 頑皮世界（半天）' },
        { time: '13:00', text: '午餐 → 上國道' },
        { time: '16:00', text: '🏠 回到新竹' }
      ]
    };

    const TYPE_COLORS = {
      hotel:      '#1a1a2e',
      attraction: '#d63384',
      food:       '#ff8c00',
      activity:   '#6c5ce7'
    };

    const TYPE_LABELS = {
      hotel:      '住宿',
      attraction: '景點',
      food:       '美食',
      activity:   '體驗'
    };

    const VISITED_STYLE = {
      fillColor: '#ffafbd',
      fillOpacity: 0.35,
      color: '#d63384',
      weight: 2
    };
    const UNVISITED_STYLE = {
      fillColor: '#e0e0e0',
      fillOpacity: 0.15,
      color: '#bbb',
      weight: 1
    };

    // --- Map init ---
    const map = L.map('map', { zoomControl: true }).setView([23.00, 120.18], 12);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; OpenStreetMap &copy; CARTO',
      maxZoom: 19
    }).addTo(map);

    // --- Load data ---
    let districtLayer, allMarkers = [], routeLines = [];

    Promise.all([
      fetch('data/districts.geojson').then(r => r.json()),
      fetch('data/places.json').then(r => r.json())
    ]).then(([districts, places]) => {
      // Draw district polygons
      districtLayer = L.geoJSON(districts, {
        style: feature => {
          const name = feature.properties.TOWNNAME;
          return VISITED_DISTRICTS.includes(name) ? VISITED_STYLE : UNVISITED_STYLE;
        },
        onEachFeature: (feature, layer) => {
          layer.bindTooltip(feature.properties.TOWNNAME, {
            sticky: true, direction: 'center'
          });
        }
      }).addTo(map);

      // Draw markers
      places.forEach(place => {
        const isHotel = place.type === 'hotel';
        const color = TYPE_COLORS[place.type] || '#333';
        const size = isHotel ? 40 : 32;
        const badge = TYPE_LABELS[place.type] || place.type;

        const dayTags = (place.day || []).map(d =>
          `<span class="day-tag" style="background:${DAY_COLORS[d]}">${DAY_LABELS[d]}</span>`
        ).join('');

        const marker = L.marker([place.lat, place.lng], {
          icon: L.divIcon({
            className: 'custom-marker',
            html: `<div style="
              background: ${color};
              color: #fff;
              width: ${size}px; height: ${size}px;
              border-radius: 50%;
              display: flex; align-items: center; justify-content: center;
              box-shadow: 0 2px 8px rgba(0,0,0,${isHotel ? 0.5 : 0.3});
              border: ${isHotel ? 3 : 2}px solid #fff;
              font-size: ${isHotel ? 18 : 14}px;
              ${isHotel ? 'animation: pulse 2s infinite;' : ''}
            "><i class="fa-solid fa-${place.icon}"></i></div>`,
            iconSize: [size, size],
            iconAnchor: [size/2, size/2],
            popupAnchor: [0, -size/2]
          }),
          zIndexOffset: isHotel ? 1000 : 0
        });

        marker.bindPopup(`
          <div class="place-popup">
            <h3><i class="fa-solid fa-${place.icon}"></i> ${place.name}</h3>
            <div class="district"><i class="fa-solid fa-location-dot"></i> ${place.district}</div>
            <span class="type-badge" style="background:${color}">${badge}</span>
            <div class="note">${place.note}</div>
            <div class="day-tags">${dayTags}</div>
          </div>
        `, { maxWidth: 280 });

        marker.placeData = place;
        marker.addTo(map);
        allMarkers.push(marker);
      });

      // Fit bounds
      if (allMarkers.length) {
        map.fitBounds(L.featureGroup(allMarkers).getBounds().pad(0.1));
      }

      // Build route lines for each day
      for (const [day, color] of Object.entries(DAY_COLORS)) {
        const dayNum = parseInt(day);
        const dayPlaces = places.filter(p => p.day && p.day.includes(dayNum) && p.type !== 'hotel');
        if (dayPlaces.length < 2) continue;

        // Add hotel as start/end
        const hotel = places.find(p => p.type === 'hotel');
        const coords = [
          [hotel.lat, hotel.lng],
          ...dayPlaces.map(p => [p.lat, p.lng]),
          [hotel.lat, hotel.lng]
        ];

        const line = L.polyline(coords, {
          color: color,
          weight: 3,
          opacity: 0.6,
          dashArray: '8, 8'
        });
        line.dayNum = dayNum;
        routeLines.push(line);
      }
    });

    // --- Day filter ---
    const panel = document.getElementById('itinerary-panel');

    function filterDay(day) {
      // Show/hide markers
      allMarkers.forEach(m => {
        const place = m.placeData;
        if (day === 'all' || place.type === 'hotel' || (place.day && place.day.includes(parseInt(day)))) {
          m.setOpacity(1);
          if (m.getElement()) m.getElement().style.pointerEvents = 'auto';
        } else {
          m.setOpacity(0.2);
          if (m.getElement()) m.getElement().style.pointerEvents = 'none';
        }
      });

      // Show/hide route lines
      routeLines.forEach(line => {
        if (day === 'all' || line.dayNum === parseInt(day)) {
          line.addTo(map);
          if (day !== 'all') line.setStyle({ opacity: 0.8, weight: 4 });
          else line.setStyle({ opacity: 0.4, weight: 3 });
        } else {
          map.removeLayer(line);
        }
      });

      // Show itinerary panel
      if (day !== 'all' && DAY_ITINERARY[day]) {
        const items = DAY_ITINERARY[day];
        const dayNum = parseInt(day);
        panel.innerHTML = `
          <h4 style="color:${DAY_COLORS[dayNum]}">
            <i class="fa-solid fa-route"></i> ${DAY_LABELS[dayNum]} 行程
          </h4>
          ${items.map(it => `
            <div class="itin-item">
              <span class="itin-time">${it.time}</span>
              <span>${it.text}</span>
            </div>
          `).join('')}
        `;
        panel.style.display = 'block';
      } else {
        panel.style.display = 'none';
      }
    }

    document.querySelectorAll('.day-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        filterDay(btn.dataset.day);
      });
    });

    // --- Legend ---
    const legend = L.control({ position: 'bottomright' });
    legend.onAdd = () => {
      const div = L.DomUtil.create('div', 'legend');
      div.innerHTML = `
        <h4>圖例</h4>
        <div class="legend-item">
          <div class="legend-color" style="background:#ffafbd;border-color:#d63384;"></div>
          <span>行程涵蓋區域</span>
        </div>
        <div class="legend-item">
          <div class="legend-color" style="background:#e0e0e0;border-color:#bbb;"></div>
          <span>未涵蓋區域</span>
        </div>
        <div class="legend-item" style="margin-top:8px;">
          <div class="legend-color" style="background:#1a1a2e;border-radius:50%;"></div>
          <span>住宿</span>
        </div>
        <div class="legend-item">
          <div class="legend-color" style="background:#d63384;border-radius:50%;"></div>
          <span>景點</span>
        </div>
        <div class="legend-item">
          <div class="legend-color" style="background:#ff8c00;border-radius:50%;"></div>
          <span>美食</span>
        </div>
        <div class="legend-item">
          <div class="legend-color" style="background:#6c5ce7;border-radius:50%;"></div>
          <span>體驗</span>
        </div>
        <div class="legend-item" style="margin-top:8px;">
          <div class="legend-color" style="background:#e74c3c;border-radius:2px;height:4px;margin:7px 0;"></div>
          <span>Fri</span>
        </div>
        <div class="legend-item">
          <div class="legend-color" style="background:#3498db;border-radius:2px;height:4px;margin:7px 0;"></div>
          <span>Sat</span>
        </div>
        <div class="legend-item">
          <div class="legend-color" style="background:#2ecc71;border-radius:2px;height:4px;margin:7px 0;"></div>
          <span>Sun</span>
        </div>
        <div class="legend-item">
          <div class="legend-color" style="background:#f39c12;border-radius:2px;height:4px;margin:7px 0;"></div>
          <span>Mon</span>
        </div>
      `;
      return div;
    };
    legend.addTo(map);
  </script>
</body>
</html>
