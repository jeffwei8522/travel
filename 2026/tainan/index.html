<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026 台南小旅行 — Jeff & Hannah</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans TC', sans-serif; }

    /* Top bar */
    .topbar {
      background: linear-gradient(to right, #ffafbd, #ffc3a0);
      color: #fff;
      padding: 0.8rem 1.2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      z-index: 1000;
      position: relative;
    }
    .topbar h1 { font-size: 1.2rem; text-shadow: 1px 1px 2px rgba(0,0,0,0.2); }
    .topbar .subtitle { font-size: 0.85rem; opacity: 0.9; }

    /* Day filter buttons */
    .day-filter {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
    }
    .day-btn {
      padding: 0.35rem 0.8rem;
      border: 2px solid #fff;
      border-radius: 20px;
      background: transparent;
      color: #fff;
      font-weight: bold;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Noto Sans TC', sans-serif;
    }
    .day-btn:hover { background: rgba(255,255,255,0.3); }
    .day-btn.active { background: #fff; color: #d63384; }

    /* Map container */
    #map { width: 100%; height: calc(100vh - 56px); }

    /* Legend */
    .legend {
      background: white;
      padding: 12px 16px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      font-size: 0.85rem;
      line-height: 1.8;
    }
    .legend h4 { margin-bottom: 6px; color: #333; }
    .legend-item { display: flex; align-items: center; gap: 8px; }
    .legend-color {
      width: 18px; height: 18px;
      border-radius: 3px;
      border: 1px solid rgba(0,0,0,0.2);
      flex-shrink: 0;
    }

    /* Popup styling */
    .place-popup h3 { color: #d63384; margin-bottom: 4px; font-size: 1rem; }
    .place-popup .district { color: #888; font-size: 0.85rem; }
    .place-popup .note { margin-top: 6px; font-size: 0.9rem; }
    .place-popup .type-badge {
      display: inline-block;
      padding: 1px 8px;
      border-radius: 10px;
      font-size: 0.75rem;
      font-weight: bold;
      color: #fff;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div>
      <h1>2026 台南小旅行</h1>
      <span class="subtitle">4/4 (六) ~ 4/6 (一) ・ Jeff & Hannah</span>
    </div>
    <div class="day-filter">
      <button class="day-btn active" data-day="all">全部</button>
      <button class="day-btn" data-day="1">Day 1</button>
      <button class="day-btn" data-day="2">Day 2</button>
      <button class="day-btn" data-day="3">Day 3</button>
    </div>
  </div>
  <div id="map"></div>

  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // --- Config ---
    const VISITED_DISTRICTS = [
      '學甲區', '白河區', '東山區', '七股區',
      '安平區', '中西區', '北區', '南區', '東區',
      '安平區(海)'
    ];

    const TYPE_COLORS = {
      attraction: '#d63384',
      food:       '#ff8c00',
      activity:   '#6c5ce7'
    };

    const TYPE_LABELS = {
      attraction: '景點',
      food:       '美食',
      activity:   '體驗'
    };

    // District polygon styles
    const VISITED_STYLE = {
      fillColor: '#ffafbd',
      fillOpacity: 0.35,
      color: '#d63384',
      weight: 2
    };
    const UNVISITED_STYLE = {
      fillColor: '#e0e0e0',
      fillOpacity: 0.2,
      color: '#999',
      weight: 1
    };

    // --- Map init ---
    const map = L.map('map', { zoomControl: true }).setView([23.05, 120.22], 11);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; OpenStreetMap &copy; CARTO',
      maxZoom: 19
    }).addTo(map);

    // --- Load data ---
    let districtLayer, markers = [];

    Promise.all([
      fetch('data/districts.geojson').then(r => r.json()),
      fetch('data/places.json').then(r => r.json())
    ]).then(([districts, places]) => {
      // Draw district polygons
      districtLayer = L.geoJSON(districts, {
        style: feature => {
          const name = feature.properties.TOWNNAME;
          return VISITED_DISTRICTS.includes(name) ? VISITED_STYLE : UNVISITED_STYLE;
        },
        onEachFeature: (feature, layer) => {
          const name = feature.properties.TOWNNAME;
          layer.bindTooltip(name, {
            sticky: true,
            className: 'district-tooltip',
            direction: 'center'
          });
        }
      }).addTo(map);

      // Draw markers
      places.forEach(place => {
        const color = TYPE_COLORS[place.type] || '#333';
        const badge = TYPE_LABELS[place.type] || place.type;

        const marker = L.marker([place.lat, place.lng], {
          icon: L.divIcon({
            className: 'custom-marker',
            html: `<div style="
              background: ${color};
              color: #fff;
              width: 32px; height: 32px;
              border-radius: 50%;
              display: flex; align-items: center; justify-content: center;
              box-shadow: 0 2px 6px rgba(0,0,0,0.3);
              border: 2px solid #fff;
              font-size: 14px;
            "><i class="fa-solid fa-${place.icon}"></i></div>`,
            iconSize: [32, 32],
            iconAnchor: [16, 16],
            popupAnchor: [0, -18]
          })
        });

        marker.bindPopup(`
          <div class="place-popup">
            <h3><i class="fa-solid fa-${place.icon}"></i> ${place.name}</h3>
            <div class="district"><i class="fa-solid fa-location-dot"></i> ${place.district}</div>
            <span class="type-badge" style="background:${color}">${badge}</span>
            <div class="note">${place.note}</div>
          </div>
        `, { maxWidth: 280 });

        marker.placeData = place;
        marker.addTo(map);
        markers.push(marker);
      });

      // Fit bounds to all markers
      if (markers.length) {
        const group = L.featureGroup(markers);
        map.fitBounds(group.getBounds().pad(0.1));
      }
    });

    // --- Day filter (placeholder - will connect to itinerary data later) ---
    document.querySelectorAll('.day-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        // TODO: filter markers by day when itinerary is finalized
      });
    });

    // --- Legend ---
    const legend = L.control({ position: 'bottomright' });
    legend.onAdd = () => {
      const div = L.DomUtil.create('div', 'legend');
      div.innerHTML = `
        <h4>圖例</h4>
        <div class="legend-item">
          <div class="legend-color" style="background:#ffafbd;border-color:#d63384;"></div>
          <span>行程涵蓋區域</span>
        </div>
        <div class="legend-item">
          <div class="legend-color" style="background:#e0e0e0;border-color:#999;"></div>
          <span>未涵蓋區域</span>
        </div>
        <div class="legend-item" style="margin-top:6px;">
          <div class="legend-color" style="background:#d63384;border-radius:50%;"></div>
          <span>景點</span>
        </div>
        <div class="legend-item">
          <div class="legend-color" style="background:#ff8c00;border-radius:50%;"></div>
          <span>美食</span>
        </div>
        <div class="legend-item">
          <div class="legend-color" style="background:#6c5ce7;border-radius:50%;"></div>
          <span>體驗</span>
        </div>
      `;
      return div;
    };
    legend.addTo(map);
  </script>
</body>
</html>
